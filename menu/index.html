          #selection-widget button {

        <div
          id="selection-widget"
          style="
            max-width: 500px;
            margin: 0 auto;
            font-family: sans-serif;
            background: #ffffff;
            border-radius: 10px;

        >
          <div class="step" id="step1">
            <h3 style="margin: 0 10px">Pasirinkite klasę</h3>
            <button onclick="selectClass('5-6', this)">5–6 kl.</button>
            <button onclick="selectClass('7-8', this)">7–8 kl.</button>
          </div>

          <div class="step" id="step2" style="display: none">
            <h3 style="margin: 0 10px">Pasirinkite laikotarpį</h3>
            <button onclick="selectPeriod('first-half', this)">
              Liepos pirmos dvi savaitės
            </button>
            <button onclick="selectPeriod('second-half', this)">
              Liepos antros dvi savaitės
            </button>
          </div>

          <div class="step" id="step3" style="display: none">
            <h3 style="margin: 0 10px">Pasirinkite laiką</h3>
            <button onclick="goToPage('11-13', this)">11:00–13:00</button>
            <button onclick="goToPage('13-15', this)">13:00–15:00</button>
          </div>
        </div>

        <script>
          let selectedClass = "";
          let selectedPeriod = "";

          function setActiveButton(containerId, clickedButton) {
            const buttons = document.querySelectorAll(`#${containerId} button`);
            buttons.forEach((btn) => btn.classList.remove("active"));
            clickedButton.classList.add("active");
          }

          function selectClass(classValue, button) {
            selectedClass = classValue;
            setActiveButton("step1", button);

            document.getElementById("step2").style.display = "block";
            document.getElementById("step3").style.display = "none";
          }

          function selectPeriod(periodValue, button) {
            selectedPeriod = periodValue;
            setActiveButton("step2", button);

            document.getElementById("step3").style.display = "block";
          }

          function goToPage(timeValue, button) {
            setActiveButton("step3", button);

            const links = {
              "5-6": {
                "first-half": {
                  "11-13":
                    "https://matememo.netlify.app/Calender26L1D1M",
                  "13-15":
                    "https://matememo.netlify.app/Calender26L1D2M",
                },
                "second-half": {
                  "11-13":
                    "https://matememo.netlify.app/Calender26L2D1M",
                  "13-15":
                    "https://matememo.netlify.app/Calender26L2D2M",
                },
              },
              "7-8": {
                "first-half": {
                  "11-13":
                    "https://matememo.netlify.app/Calender26L1D1D",
                  "13-15":
                    "https://matememo.netlify.app/Calender26L1D2D",
                },
                "second-half": {
                  "11-13":
                    "https://matememo.netlify.app/Calender26L2D1D",
                  "13-15":
                    "https://matememo.netlify.app/Calender26L2D2D",
                },
              },
            };

            const url = links[selectedClass][selectedPeriod][timeValue];

            if (url) {
              window.location.href = url;
            }
          }
        </script>
      </div>

        <script>
          function showSlide(slideNumber) {
            const slides = document.querySelectorAll(".slide");

            slides.forEach((slide) => {
              slide.classList.remove("active");
            });

            document
              .getElementById("slide" + slideNumber)
              .classList.add("active");
          }
